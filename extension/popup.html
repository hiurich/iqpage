<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageIQ</title>
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>
  <!-- Logged Out State -->
  <div id="view-auth" class="view">
    <div class="logo-section">
      <div class="logo">IQ</div>
      <h1>PageIQ</h1>
      <p class="tagline">AI-powered page analysis</p>
    </div>
    <button id="btn-signin" class="btn btn-primary btn-full">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Logged In State -->
  <div id="view-main" class="view hidden">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-left">
        <div class="logo-sm">IQ</div>
        <span class="app-name">PageIQ</span>
      </div>
      <div class="header-right">
        <span id="plan-badge" class="badge">FREE</span>
        <button id="btn-open-panel" class="btn btn-icon" title="Open Side Panel">⊞</button>
        <button id="btn-menu" class="btn btn-icon" title="Menu">⋮</button>
      </div>
    </div>

    <!-- Dropdown menu -->
    <div id="dropdown-menu" class="dropdown hidden">
      <a href="#" id="menu-upgrade">⚡ Upgrade Plan</a>
      <a href="#" id="menu-history">🕒 View History</a>
      <a href="#" id="menu-signout">Sign Out</a>
    </div>

    <!-- Current page info -->
    <div class="page-info">
      <div class="page-domain" id="page-domain">Loading...</div>
      <div class="page-title" id="page-title"></div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-grid">
      <button id="btn-summarize" class="action-btn" title="Summarize this page">
        <span class="action-icon">📄</span>
        <span>Summarize</span>
      </button>
      <button id="btn-open-chat" class="action-btn" title="Open Q&A panel">
        <span class="action-icon">💬</span>
        <span>Q&A Chat</span>
      </button>
      <button id="btn-bias" class="action-btn pro-feature" title="Detect bias">
        <span class="action-icon">⚖️</span>
        <span>Bias Check</span>
        <span class="pro-tag">PRO</span>
      </button>
      <button id="btn-compare" class="action-btn power-feature" title="Compare tabs">
        <span class="action-icon">🔀</span>
        <span>Compare</span>
        <span class="pro-tag power">PWR</span>
      </button>
    </div>

    <!-- Quick Niche Prompts -->
    <div class="section-label">Quick Prompts</div>
    <div class="niche-buttons">
      <button class="niche-btn" data-prompt="legal_analysis">⚖️ Legal</button>
      <button class="niche-btn" data-prompt="study_guide">📚 Study</button>
      <button class="niche-btn" data-prompt="social_post">📱 Social</button>
      <button class="niche-btn" data-prompt="consulting_summary">💼 Consulting</button>
      <button class="niche-btn" data-prompt="scientific_analysis">🔬 Science</button>
    </div>

    <!-- Language selector for summary -->
    <div class="lang-row">
      <label for="target-lang">Summary language:</label>
      <select id="target-lang">
        <option value="">Same as page</option>
        <option value="Spanish">Spanish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Italian">Italian</option>
        <option value="Japanese">Japanese</option>
        <option value="Chinese">Chinese</option>
      </select>
    </div>

    <!-- Usage meter -->
    <div class="usage-section">
      <div class="usage-row">
        <span>Summaries</span>
        <div class="usage-bar">
          <div class="usage-fill" id="usage-summaries" style="width:0%"></div>
        </div>
        <span id="usage-summaries-text">0/5</span>
      </div>
      <div class="usage-row">
        <span>Q&A</span>
        <div class="usage-bar">
          <div class="usage-fill" id="usage-qa" style="width:0%"></div>
        </div>
        <span id="usage-qa-text">0/10</span>
      </div>
    </div>

    <!-- Result area -->
    <div id="result-area" class="result-area hidden">
      <div class="result-header">
        <span id="result-label">Summary</span>
        <div class="result-actions">
          <button id="btn-export-pdf" class="btn-tiny" title="Export PDF">PDF</button>
          <button id="btn-export-word" class="btn-tiny" title="Export Word">DOC</button>
          <button id="btn-export-md" class="btn-tiny power-only" title="Export Markdown">MD</button>
          <button id="btn-close-result" class="btn-tiny">✕</button>
        </div>
      </div>
      <div id="result-content" class="result-content"></div>
      <div id="reading-questions" class="reading-questions hidden"></div>
    </div>

    <!-- Loading state -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p id="loading-text">Analyzing page...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
